name: cornflow-client tests

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - 'libs/client/**'
      - '.github/workflows/test_cornflow_client.yml'
      - '!libs/client/README.rst'
  push:
    branches:
      - master
    paths:
      - 'libs/client/**'
      - '.github/workflows/test_cornflow_client.yml'
      - '!libs/client/README.rst'

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    name: Run unit test on cornflow-client
    defaults:
      run:
        working-directory: ./libs/client
    strategy:
      max-parallel: 21
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Test
        run: |
          uv run coverage run -m unittest discover -s cornflow_client/tests/unit
          uv run coverage report -m

  integration:
    name: Run all test suites on cornflow-client
    needs: unit
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./libs/client
    strategy:
      max-parallel: 21
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
      - name: Copy DAG files
        run: |
          cd ../..
          mkdir -p cornflow-server/airflow_config/dags
          cp -r cornflow-dags/DAG/* cornflow-server/airflow_config/dags/
      - name: Create DAG stub files for Airflow discovery
        run: |
          cd ../..
          DAGS_DIR="cornflow-server/airflow_config/dags"

          echo "Creating stub DAG files for package-based DAGs..."

          for pkg in solve_model_dag facility_location knapsack two_dimension_bin_packing rostering tsp vrp bar_cutting roadef graph_coloring; do
            if [ -d "${DAGS_DIR}/${pkg}" ] && [ ! -f "${DAGS_DIR}/${pkg}.py" ]; then
              echo "from ${pkg} import *" > "${DAGS_DIR}/${pkg}.py"
              echo "Created stub for ${pkg}"
            fi
          done

          echo "Current DAG directory contents:"
          ls -la "${DAGS_DIR}" | head -200
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Install airflow
        run: |
          cd ../..
          cd cornflow-server
          uv venv afvenv --python "$(which python)"
          AIRFLOW_VERSION=2.9.1
          PYTHON_VERSION="$(afvenv/bin/python --version | cut -d " " -f 2 | cut -d "." -f 1-2)"
          CLIENT_BRANCH="${{ github.head_ref || github.ref_name }}"
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          uv pip install --python afvenv/bin/python "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"
          uv pip install --python afvenv/bin/python orloge pulp
          uv pip install --python afvenv/bin/python "git+https://github.com/baobabsoluciones/cornflow@${CLIENT_BRANCH}#subdirectory=libs/client"
          uv pip install --python afvenv/bin/python -e "$GITHUB_WORKSPACE/cornflow-dags"
          afvenv/bin/airflow db init
          afvenv/bin/airflow users create -u admin -f admin -l admin -r Admin -p admin -e admin@example.org
          afvenv/bin/airflow webserver -p 8080 &
          afvenv/bin/airflow scheduler &
          sleep 45
        env:
          AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: 0
          AIRFLOW_HOME: ${{ github.workspace }}/cornflow-server/airflow_config
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/cornflow-server/airflow_config/dags
          AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 0
          AIRFLOW__API__AUTH_BACKEND: airflow.api.auth.backend.basic_auth
          AIRFLOW__WEBSERVER__SECRET_KEY: e9adafa751fd35adfc1fdd3285019be15eea0758f76e38e1e37a1154fb36
          AIRFLOW__CORE__LOAD_EXAMPLES: 0
          AIRFLOW_CONN_CF_URI: http://airflow:Airflow_test_password1@localhost:5050
      - name: Diagnose DAG import errors
        run: |
          cd ../..
          cd cornflow-server
          afvenv/bin/airflow dags list-import-errors || true
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/cornflow-server/airflow_config
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/cornflow-server/airflow_config/dags
      - name: Wait for Airflow DAGs
        run: |
          set -e
          cd ../..
          cd cornflow-server
          export AIRFLOW_HOME="${{ github.workspace }}/cornflow-server/airflow_config"
          export AIRFLOW__CORE__DAGS_FOLDER="${{ github.workspace }}/cornflow-server/airflow_config/dags"
          echo "Waiting for Airflow API..."
          for i in $(seq 1 30); do
            if curl -sf -u admin:admin "http://127.0.0.1:8080/health" >/dev/null; then
              echo "Airflow is healthy"
              break
            fi
            sleep 5
          done
          echo "Waiting for solve_model_dag to appear in CLI..."
          for i in $(seq 1 30); do
            if afvenv/bin/airflow dags list | awk 'NR>2 {print $1}' | grep -xq "solve_model_dag"; then
              echo "solve_model_dag found (CLI)"
              exit 0
            fi
            sleep 10
          done
          echo "solve_model_dag NOT found. Diagnostics:"
          afvenv/bin/airflow dags list | head -200 || true
          afvenv/bin/airflow dags list-import-errors || true
          echo "API DAG list (info only):"
          curl -s -u admin:admin "http://127.0.0.1:8080/api/v1/dags?limit=200" | head -200 || true
          exit 1
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/cornflow-server/airflow_config
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/cornflow-server/airflow_config/dags
      - name: Run cornflow
        run: |
          cd ../..
          cd cornflow-server
          uv sync --extra dev
          CLIENT_BRANCH="${{ github.head_ref || github.ref_name }}"
          uv pip uninstall cornflow-client
          uv pip install "git+https://github.com/baobabsoluciones/cornflow@${CLIENT_BRANCH}#subdirectory=libs/client"
          uv run flask db upgrade -d cornflow/migrations/
          uv run flask access_init
          uv run flask register_deployed_dags -r http://127.0.0.1:8080 -u admin -p admin
          uv run flask create_admin_user -u admin -e admin@cornflow.org -p Adminpassword1!
          uv run flask create_service_user -u airflow -e airflow@cornflow.org -p Airflow_test_password1
          uv run flask create_base_user -u user -e user@cornflow.org -p UserPassword1!
          uv run flask register_dag_permissions -o 1
          uv run flask run -p 5050 &
          sleep 5
        env:
          FLASK_ENV: testing
          FLASK_APP: cornflow.app
          AIRFLOW_URL: http://127.0.0.1:8080
          AIRFLOW_USER: admin
          AIRFLOW_PWD: admin
          SECRET_KEY: THISNEEDSTOBECHANGED
          OPEN_DEPLOYMENT: 1
          AUTH_TYPE: 1
          LOG_LEVEL: 10
          CORNFLOW_SERVICE_USER: airflow
          SIGNUP_ACTIVATED: 1
      - name: Run unit tests
        run: |
          uv run coverage run -m unittest discover -s cornflow_client/tests/unit
          uv run coverage report -m
      - name: Run integration tests
        run: |
          uv run coverage run -a -m unittest discover -s cornflow_client/tests/integration
          uv run coverage report -m
          uv run coverage xml
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v3
        with:
          flags: client-tests
          token: ${{secrets.CODECOV_TOKEN}}
