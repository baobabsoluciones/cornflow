name: cornflow-client tests

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - 'libs/client/**'
      - '.github/workflows/test_cornflow_client.yml'
      - '!libs/client/README.rst'
  push:
    branches:
      - master
    paths:
      - 'libs/client/**'
      - '.github/workflows/test_cornflow_client.yml'
      - '!libs/client/README.rst'

jobs:
  unit:
    runs-on: ${{ matrix.os }}
    name: Run unit test on cornflow-client
    defaults:
      run:
        working-directory: ./libs/client
    strategy:
      max-parallel: 21
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest, macOS-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Test
        run: |
          uv run coverage run -m unittest discover -s cornflow_client/tests/unit
          uv run coverage report -m

  integration:
    name: Run all test suites on cornflow-client
    needs: unit
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./libs/client
    strategy:
      max-parallel: 21
      matrix:
        python-version: ['3.10', '3.11', '3.12']
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
      - name: Copy DAG files
        run: |
          cd ../..
          mkdir -p cornflow-server/airflow_config/dags
          cp -r cornflow-dags/DAG/* cornflow-server/airflow_config/dags/
          cp cornflow-dags/pyproject.toml cornflow-server/airflow_config/
      - name: Create DAG stub files for Airflow discovery
        run: |
          cd ../..
          DAGS_DIR="cornflow-server/airflow_config/dags"
          for pkg in solve_model_dag facility_location knapsack two_dimension_bin_packing rostering tsp vrp bar_cutting roadef graph_coloring; do
            if [ -d "${DAGS_DIR}/${pkg}" ] && [ ! -f "${DAGS_DIR}/${pkg}.py" ]; then
              echo "from ${pkg} import *" > "${DAGS_DIR}/${pkg}.py"
            fi
          done
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Install airflow and local packages
        run: |
          cd ../..
          cd cornflow-server
          uv venv afvenv --python "$(which python)"
          AIRFLOW_VERSION=2.9.1
          PYTHON_VERSION="$(afvenv/bin/python --version | cut -d " " -f 2 | cut -d "." -f 1-2)"
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          
          # INSTALACIONES LOCALES (Sin Git URLs)
          uv pip install --python afvenv/bin/python "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"
          uv pip install --python afvenv/bin/python orloge pulp
          
          # Instalar cliente y dags desde las carpetas locales del checkout
          uv pip install --python afvenv/bin/python -e ../libs/client
          uv pip install --python afvenv/bin/python -e ../cornflow-dags
          
          afvenv/bin/airflow db init
          afvenv/bin/airflow users create -u admin -f admin -l admin -r Admin -p admin -e admin@example.org
          ./afvenv/bin/airflow dags reserialize
          afvenv/bin/airflow webserver -p 8080 &
          afvenv/bin/airflow scheduler &
        env:
          AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: 0
          AIRFLOW_HOME: ${{ github.workspace }}/cornflow-server/airflow_config
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:///${{ github.workspace }}/cornflow-server/airflow_config/airflow.db
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/cornflow-server/airflow_config/dags
          AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 0
          AIRFLOW__API__AUTH_BACKEND: airflow.api.auth.backend.basic_auth
          AIRFLOW__WEBSERVER__SECRET_KEY: e9adafa751fd35adfc1fdd3285019be15eea0758f76e38e1e37a1154fb36
          AIRFLOW__CORE__LOAD_EXAMPLES: 0
          AIRFLOW_CONN_CF_URI: http://airflow:Airflow_test_password1@localhost:5050
      - name: Wait for Airflow DAGs
        run: |
          # Esperar a que el DAG exista y sea visible en el listado general
          for i in $(seq 1 45); do
            if curl -sf -u admin:admin "http://127.0.0.1:8080/api/v1/dags/solve_model_dag" > /dev/null && \
               curl -sf -u admin:admin "http://127.0.0.1:8080/api/v1/dags" | grep -q "solve_model_dag"; then
              echo "SUCCESS: solve_model_dag is loaded in Airflow"
              exit 0
            fi
            echo "Waiting for Airflow DAG discovery... ($i/45)"
            sleep 10
          done
          echo "ERROR: Airflow never exposed solve_model_dag"
          curl -u admin:admin "http://127.0.0.1:8080/api/v1/dags"
          curl -u admin:admin "http://127.0.0.1:8080/api/v1/dags/solve_model_dag"
          exit 1
        env:
          AIRFLOW_HOME: ${{ github.workspace }}/cornflow-server/airflow_config
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:///${{ github.workspace }}/cornflow-server/airflow_config/airflow.db
          AIRFLOW__CORE__DAGS_FOLDER: ${{ github.workspace }}/cornflow-server/airflow_config/dags
      - name: Run cornflow server
        run: |
          cd ../..
          cd cornflow-server
          uv sync --extra dev
          
          # Instalar cliente local en el entorno de cornflow
          uv pip install -e ../libs/client
          
          uv run flask db upgrade -d cornflow/migrations/
          uv run flask access_init

          # Re-serializar justo antes del registro en Cornflow
          ./afvenv/bin/airflow dags reserialize

          # Reintentar el registro por posibles carreras en el parseo inicial
          for i in $(seq 1 5); do
            uv run flask register_deployed_dags -r http://127.0.0.1:8080 -u admin -p admin && break
            echo "register_deployed_dags retry $i/5"
            sleep 10
          done
          
          # Crear usuarios y permisos
          uv run flask create_admin_user -u admin -e admin@cornflow.org -p Adminpassword1!
          uv run flask create_service_user -u airflow -e airflow@cornflow.org -p Airflow_test_password1
          uv run flask create_base_user -u user -e user@cornflow.org -p UserPassword1!
          uv run flask register_dag_permissions -o 1
          
          # Arrancar servidor Cornflow
          uv run flask run -p 5050 &
          sleep 10
        env:
          FLASK_ENV: testing
          FLASK_APP: cornflow.app
          DATABASE_URL: sqlite:///${{ github.workspace }}/cornflow-server/cornflow_test.db
          AIRFLOW_HOME: ${{ github.workspace }}/cornflow-server/airflow_config
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:///${{ github.workspace }}/cornflow-server/airflow_config/airflow.db
          AIRFLOW_URL: http://127.0.0.1:8080
          AIRFLOW_USER: admin
          AIRFLOW_PWD: admin
          SECRET_KEY: THISNEEDSTOBECHANGED
          OPEN_DEPLOYMENT: 1
          AUTH_TYPE: 1
          LOG_LEVEL: 10
          CORNFLOW_SERVICE_USER: airflow
          SIGNUP_ACTIVATED: 1
      - name: Wait for DAG registration in Cornflow
        run: |
          cd ../../cornflow-server
          uv run python - <<'PY'
          import time
          import requests

          base = "http://127.0.0.1:5050"
          token = None
          for _ in range(40):
              try:
                  response = requests.post(
                      f"{base}/login/",
                      json={"username": "airflow", "password": "Airflow_test_password1"},
                      timeout=10,
                  )
                  if response.status_code == 200:
                      token = response.json().get("token")
                      if token:
                          break
              except requests.RequestException:
                  pass
              time.sleep(3)

          if not token:
              raise SystemExit("Could not login as airflow user in Cornflow")

          headers = {"Authorization": f"Bearer {token}"}
          for _ in range(60):
              try:
                  response = requests.get(
                      f"{base}/dag/deployed/",
                      headers=headers,
                      timeout=10,
                  )
                  if response.status_code == 200:
                      dags = [item.get("id") for item in response.json()]
                      if "solve_model_dag" in dags:
                          print("solve_model_dag is registered in Cornflow")
                          raise SystemExit(0)
              except requests.RequestException:
                  pass
              time.sleep(3)

          raise SystemExit("solve_model_dag is still missing in Cornflow deployed DAGs")
          PY
      - name: Run unit tests
        run: |
          uv run coverage run -m unittest discover -s cornflow_client/tests/unit
          uv run coverage report -m
      - name: Run integration tests
        run: |
          uv run coverage run -a -m unittest discover -s cornflow_client/tests/integration
          uv run coverage report -m
          uv run coverage xml
      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v3
        with:
          flags: client-tests
          token: ${{secrets.CODECOV_TOKEN}}
