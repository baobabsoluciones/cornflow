# Basic Airflow cluster configuration for CeleryExecutor with Redis and PostgreSQL.
#
# WARNING: This configuration is for local development. Do not use it in a production deployment.
#
# This configuration supports basic configuration using environment variables or an .env file
# The following variables are supported:
#
# Feel free to modify this file to suit your needs.
version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: ./cornflow-server/airflow_config
  image: cornflow-airflow:local
  platform: linux/amd64
  environment: &airflow-common-env
    AIRFLOW_USER: admin
    AIRFLOW_PWD: admin
    AIRFLOW_DB_HOST: airflow_db
    AIRFLOW_DB_PORT: 5432
    AIRFLOW_DB_USER: airflow
    AIRFLOW_DB_PASSWORD: airflow
    AIRFLOW_DB: airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    EXECUTOR: Celery
    AIRFLOW__WEBSERVER__INSTANCE_NAME: CornflowEnv
    AIRFLOW__WEBSERVER__NAVBAR_COLOR: "#0693e3"
    CORNFLOW_VENVS_DIR: /usr/local/airflow/venvs
  volumes:
    # Internal DAG scripts
    - ./cornflow-dags/DAG/activate_dags.py:/usr/local/airflow/dags/activate_dags.py
    - ./cornflow-dags/DAG/update_all_schemas.py:/usr/local/airflow/dags/update_all_schemas.py
    - ./cornflow-dags/DAG/update_dag_registry.py:/usr/local/airflow/dags/update_dag_registry.py
    # Model repos as grouping folders (recursive import discovers apps inside)
    - ./cornflow-dags/ie_planificacion_docente:/usr/local/airflow/dags/ie_planificacion_docente
    - ./cornflow-dags/ie_planificacion_examenes:/usr/local/airflow/dags/ie_planificacion_examenes
    # Per-venv requirements: init script creates a venv per .txt file
    # and also installs each into the base env for DAG parsing
    - ./cornflow-dags/requirements:/requirements
    # Logs, plugins, settings
    - ./cornflow-server/airflow_config/logs:/usr/local/airflow/logs
    - ./cornflow-server/airflow_config/plugins:/usr/local/airflow/plugins
    - ./cornflow-server/airflow_config/airflow_local_settings.py:/usr/local/airflow/config/airflow_local_settings.py
    
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    airflow_db:
      condition: service_healthy

x-cornflow-common: &cornflow-common
  build:
    context: ./cornflow-server
  platform: linux/amd64
  environment: &cornflow-common-env
    CORNFLOW_ADMIN_USER: cornflow_admin
    CORNFLOW_ADMIN_PWD: Cornflow_admin1234
    CORNFLOW_SERVICE_USER: service_user
    CORNFLOW_SERVICE_PWD: Service_user1234
    CORNFLOW_DB_HOST: cornflow_db
    CORNFLOW_DB_PORT: 5432
    CORNFLOW_DB_USER: cornflow
    CORNFLOW_DB_PASSWORD: cornflow
    CORNFLOW_DB: cornflow
  depends_on: &cornflow-common-depends-on
    cornflow_db:
      condition: service_healthy


services:
  cornflow:
    <<: *cornflow-common
    restart: always
    ports:
      - 5000:5000
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/src/app/gunicorn.pid ]"]
      interval: 30s
      timeout: 30s
      retries: 5
    environment:
      <<: *cornflow-common-env
    depends_on:
      <<: *cornflow-common-depends-on

  cornflow_db:
    image: postgres:15.4
    environment:
      - POSTGRES_USER=cornflow
      - POSTGRES_PASSWORD=cornflow
      - POSTGRES_DB=cornflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "cornflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always
    volumes:
      - postgres_cf_data:/var/lib/postgresql/data/

  airflow_db:
    image: postgres:15.4
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    volumes:
      - postgres_af_data:/var/lib/postgresql/data/

  webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - 8080:8080
    healthcheck:
      test: ["CMD-SHELL", "[ -f /usr/local/airflow/airflow-webserver.pid ]"]    
      interval: 30s
      timeout: 30s
      retries: 5
    environment:
      <<: *airflow-common-env
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  # You can enable flower by adding "--profile flower" option e.g. docker-compose --profile flower up
  # or by explicitly targeted on the command line e.g. docker-compose up flower.
  # See: https://docs.docker.com/compose/profiles/
  flower:
    <<: *airflow-common
    command: flower
    profiles:
      - flower
    ports:
      - "5555:5555"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:5555/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

  redis:
    image: redis:latest
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  worker:
    <<: *airflow-common
    command: worker
    environment:
      <<: *airflow-common-env
      # Required to handle warm shutdown of the celery workers properly
      # See https://airflow.apache.org/docs/docker-stack/entrypoint.html#signal-propagation
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on

volumes:
  postgres_cf_data:
  postgres_af_data:
